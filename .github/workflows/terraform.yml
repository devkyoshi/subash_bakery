name: Terraform

on:
  push:
    branches: [main]
    paths:
      - 'infra/terraform/**'
  workflow_dispatch:

defaults:
  run:
    working-directory: infra/terraform

jobs:
  terraform:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        env:
          TF_VAR_project_id: subash-bakery-495502
          TF_VAR_mongo_password: ${{ secrets.TF_MONGO_PASSWORD }}
          TF_VAR_rabbitmq_password: ${{ secrets.TF_RABBITMQ_PASSWORD }}
          TF_VAR_jwt_secret: ${{ secrets.TF_JWT_SECRET }}
          TF_VAR_google_client_id: ${{ secrets.TF_GOOGLE_CLIENT_ID }}
          TF_VAR_google_client_secret: ${{ secrets.TF_GOOGLE_CLIENT_SECRET }}
          TF_VAR_firebase_credentials_json: ${{ secrets.TF_FIREBASE_CREDENTIALS_JSON }}
          TF_VAR_image_tag: ${{ github.sha }}
        run: |
          terraform plan -out=tfplan -no-color 2>&1 | tee plan_output.txt
          echo "exitcode=$?" >> "$GITHUB_OUTPUT"

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        env:
          TF_VAR_project_id: subash-bakery-495502
          TF_VAR_mongo_password: ${{ secrets.TF_MONGO_PASSWORD }}
          TF_VAR_rabbitmq_password: ${{ secrets.TF_RABBITMQ_PASSWORD }}
          TF_VAR_jwt_secret: ${{ secrets.TF_JWT_SECRET }}
          TF_VAR_google_client_id: ${{ secrets.TF_GOOGLE_CLIENT_ID }}
          TF_VAR_google_client_secret: ${{ secrets.TF_GOOGLE_CLIENT_SECRET }}
          TF_VAR_firebase_credentials_json: ${{ secrets.TF_FIREBASE_CREDENTIALS_JSON }}
          TF_VAR_image_tag: ${{ github.sha }}
        run: terraform apply -auto-approve tfplan

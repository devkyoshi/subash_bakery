version: "3.9"

services:
  # MongoDB
  mongodb:
    image: mongo:7.0
    container_name: erp-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: erp_db
    volumes:
      - mongodb_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - erp-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: erp-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - erp-network

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: erp-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - erp-network

  # API Gateway (ONLY PUBLIC SERVICE)
  api-gateway:
    build:
      context: .
      dockerfile: ./services/api-gateway/Dockerfile
    container_name: erp-api-gateway
    restart: unless-stopped
    environment:
      PORT: 8080
      AUTH_SERVICE_URL: http://auth-service:8001
      ORG_SERVICE_URL: http://org-service:8002
      PRODUCT_SERVICE_URL: http://product-service:8003
      INVENTORY_SERVICE_URL: http://inventory-service:8004
      PROCUREMENT_SERVICE_URL: http://procurement-service:8005
      NOTIFICATION_SERVICE_URL: http://notification-service:8007
      DASHBOARD_SERVICE_URL: http://dashboard-service:8008
      REPORT_SERVICE_URL: http://report-service:8009
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - org-service
      - product-service
      - inventory-service
      - procurement-service
      - notification-service
      - dashboard-service
      - report-service
    networks:
      - erp-network

  # Auth Service
  auth-service:
    build:
      context: .
      dockerfile: ./services/auth-service/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 8001
      MONGO_URI: mongodb://admin:admin123@mongodb:27017/erp_db?authSource=admin
      REDIS_ADDR: redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY: 15m
      REFRESH_TOKEN_EXPIRY: 168h
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    depends_on:
      - mongodb
      - redis
    networks:
      - erp-network

  # Organization Service
  org-service:
    build:
      context: .
      dockerfile: ./services/org-service/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 8002
      MONGO_URI: mongodb://admin:admin123@mongodb:27017/erp_db?authSource=admin
      REDIS_ADDR: redis:6379
      RABBITMQ_URL: amqp://admin:admin123@rabbitmq:5672/
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - erp-network

  # Product Service
  product-service:
    build:
      context: .
      dockerfile: ./services/product-service/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 8003
      MONGO_URI: mongodb://admin:admin123@mongodb:27017/erp_db?authSource=admin
      REDIS_ADDR: redis:6379
      RABBITMQ_URL: amqp://admin:admin123@rabbitmq:5672/
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - erp-network

  # Inventory Service
  inventory-service:
    build:
      context: .
      dockerfile: ./services/inventory-service/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 8004
      MONGO_URI: mongodb://admin:admin123@mongodb:27017/erp_db?authSource=admin
      REDIS_ADDR: redis:6379
      RABBITMQ_URL: amqp://admin:admin123@rabbitmq:5672/
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - erp-network

  # Notification Service
  notification-service:
    build:
      context: .
      dockerfile: ./services/notification-service/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 8007
      MONGO_URI: mongodb://admin:admin123@mongodb:27017/erp_db?authSource=admin
      DB_NAME: erp_db
      RABBITMQ_URL: amqp://admin:admin123@rabbitmq:5672/
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - ./firebase-credentials.json:/app/firebase-credentials.json:ro
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - erp-network

  #Admin Frontend
admin-frontend:
  build:
    context: ../admin-frontend
    dockerfile: Dockerfile
    args:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL} 
  container_name: erp-admin-frontend
  restart: unless-stopped
  ports:
    - "3000:3000"
  networks:
    - erp-network
  env_file:
    - ../.env

volumes:
  mongodb_data:
  redis_data:
  rabbitmq_data:

networks:
  erp-network:
    driver: bridge
